<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronos</title>
  <script>
    window.MathJax = {
      loader: {
        load: ['[tex]/mhchem']
      },
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        packages: { '[+]': ['mhchem'] }
      },
      chtml: {
        mtextInheritFont: true
      },
      svg: {
        fontCache: 'global',
        mtextInheritFont: true
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <!-- Fabric.js for whiteboard drawing -->
  <script src="https://cdn.jsdelivr.net/npm/fabric@6.5.4/dist/index.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
